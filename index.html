<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WhisperBox</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="icon" type="image/svg+xml" href="./src/assets/favicon.svg" />

<link href="https://fonts.googleapis.com/css2?family=Anonymous+Pro:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Loading overlay -->
  <div id="view-loading" class="overlay hidden">
    <div class="overlay-inner">
      <div class="spinner"></div>
      <p id="loading-text">Loading…</p>
    </div>
  </div>

  <div id="view-auth">
    <div class="auth-card">
      <div class="auth-logo">
        <img class="app-mark app-mark-xl" src="./src/assets/favicon.svg" alt="" aria-hidden="true" />
      </div>
      <p class="auth-kicker" id="auth-kicker">Welcome back</p>
      <h1>WhisperBox</h1>
      <p class="auth-sub" id="auth-sub">Sign in to continue.</p>

      <div id="auth-error" class="error-msg hidden"></div>

      <form id="auth-form" autocomplete="off">
        <div id="field-display" class="field hidden">
          <label>Display Name</label>
          <input id="input-display" type="text" placeholder="Alice" maxlength="40" />
        </div>
        <div class="field">
          <label>Username</label>
          <input id="input-username" type="text" placeholder="alice_92" maxlength="32" />
        </div>
        <div class="field">
          <label>Password</label>
          <input id="input-password" type="password" placeholder="••••••••" maxlength="128" />
        </div>
        <button type="submit" id="auth-submit">Sign In</button>
      </form>

      <p class="auth-toggle">
        <span id="toggle-text">Don't have an account?</span>
        <a href="#" id="toggle-link">Create one</a>
      </p>
    </div>
  </div>

  <div id="view-app" class="hidden">
    <aside id="sidebar">
      <div class="sidebar-header">
        <div class="brand">
          <img class="app-mark app-mark-sm" src="./src/assets/favicon.svg" alt="" aria-hidden="true" />
          <span>WhisperBox</span>
        </div>
        <button id="logout-btn" class="icon-btn" title="Logout">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>

      <div class="search-wrap">
        <input id="search-input" type="text" placeholder="Search users…" autocomplete="off" />
        <div id="search-results" class="search-dropdown hidden"></div>
      </div>

      <div id="conversations-list">
        <p class="list-empty">No conversations yet.<br/>Search for a user above.</p>
      </div>
    </aside>


    <main id="chat-panel">
      <!-- Empty state -->
      <div id="chat-empty">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none">
          <rect x="3" y="11" width="18" height="11" rx="2" stroke="currentColor" stroke-width="1.5"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <p>Select a conversation</p>
      </div>

      <div id="chat-active" class="hidden">
        <div id="chat-header">
          <div class="chat-header-left">
            <button id="back-btn" class="icon-btn">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                <path d="M19 12H5M5 12l7 7M5 12l7-7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
            <div id="chat-avatar" class="avatar"></div>
            <div>
              <div id="chat-name" class="chat-name"></div>
              <div id="chat-status" class="chat-status"></div>
            </div>
          </div>
          <span class="enc-badge"> Encrypted</span>
        </div>

        <div id="messages-container">
          <div id="load-more-wrap" class="hidden">
            <button id="load-more-btn">Load older messages</button>
          </div>
          <div id="messages-list"></div>
        </div>

        <div id="chat-input-area">
          <textarea id="msg-input" placeholder="Type a message…" rows="1" maxlength="4000"></textarea>
          <button id="send-btn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
              <path d="M22 2L11 13M22 2L15 22l-4-9-9-4 20-7z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>
      </div>
    </main>
  </div>

  <div id="logout-modal" class="modal hidden" aria-hidden="true">
    <div class="modal-backdrop" data-modal-close></div>
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="logout-title" aria-describedby="logout-desc">
      <div class="modal-hero">
        <img class="app-mark app-mark-lg" src="./src/assets/favicon.svg" alt="" aria-hidden="true" />
      </div>
      <h2 id="logout-title">Log out?</h2>
      <p id="logout-desc">You'll return to the sign-in screen.</p>
      <div class="modal-actions">
        <button type="button" id="logout-cancel" class="ghost-btn">Cancel</button>
        <button type="button" id="logout-confirm" class="danger-btn">Log out</button>
      </div>
    </div>
  </div>
  <script type="module" src="./src/app.js"></script>
</body>
</html>
